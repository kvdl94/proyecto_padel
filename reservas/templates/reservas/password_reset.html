{% extends 'reservas/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow p-4">
            <h2 class="text-center mb-2">Recuperar contraseña</h2>
            <p class="text-muted text-center small mb-4">Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="email" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn btn-dark w-100">Enviar enlace</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-muted small">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
